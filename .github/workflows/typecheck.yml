name: Typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck (${{ matrix.server }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: [orchestrator, image-gen, unity-mcp]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.server }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.server }}

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: ${{ matrix.server }}

